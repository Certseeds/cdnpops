name: build

on:
  push:
    branches: [ "master" ]
    # Publish semver tags as releases.
    tags: [ 'v*.*.*' ]

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: certseeds/common-actions/actions/checkout@v1
        with:
          submodules: true
          fetch-depth: 1

      - uses: certseeds/common-actions/actions/setup-nodejs@v1

      - name: Install dependencies
        run: pnpm install

      - name: build depage
        run: pnpm build-ff
